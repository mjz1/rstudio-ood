name: ERB templates

# The ERB templates (form.yml.erb, submit.yml.erb, template/script.sh.erb) are
# rendered by Open OnDemand inside the PUN. A mistake in them is not a stack
# trace, it is a session that fails to launch -- so they are simultaneously the
# riskiest files here and, for a long time, the only untested ones.
#
# This job runs the same suite as `test/run.sh` does locally: it renders every
# template against a fixture cluster (images, libraries, config -- all in a temp
# dir), reproduces OnDemand's binding (`context` for script.sh.erb, bare locals
# for submit.yml.erb), and asserts on the output. It also bash-parses the job
# script the template generates, and the rsession wrapper that script writes.
#
# This job used to compile the templates' ruby and stop there, which catches a
# stray `end` and nothing else -- not a nil method call, not a wrong path, not a
# bind that vanished, not a GPU flag emitted for a CPU job. The compile check is
# kept below as a backstop for the ERBs the suite does not render.
#
# Locally the same script supplies ruby from a container, because the cluster has
# none. Here the runner already has ruby, so it is used directly. Same tests.
#
# What this still cannot catch: OnDemand-specific binding differences, and
# anything that only shows up against a real Slurm. Test on the staging app
# (rstudio_next) before deploying to rstudio_dev.

on:
  pull_request:
  push:
    branches: [master, dev]
  workflow_dispatch:

jobs:
  erb:
    name: Render and check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships ruby; ERB, YAML and JSON are all default gems.
      - name: Show ruby
        run: ruby --version

      - name: Render templates and assert
        run: ./test/run.sh

      # Backstop: every ERB in the repo must at least compile, including the ones
      # the suite does not render (view.html.erb, template/before.sh.erb, after.sh.erb).
      - name: Every ERB compiles
        run: |
          set -uo pipefail
          fail=0
          for f in $(git ls-files '*.erb'); do
            if ruby -rerb -e \
              'RubyVM::InstructionSequence.compile(ERB.new(File.read(ARGV[0]), trim_mode: "-").src)' \
              "$f" 2>err.txt; then
              echo "  ok    $f"
            else
              echo "  FAIL  $f"
              sed 's/^/          /' err.txt
              fail=1
            fi
          done
          exit $fail
